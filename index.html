<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evora - Shop by Emotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Evora</div>
        <div class="nav-links">
            <button id="homeBtn">Home</button>
            <button id="happyBtn">Happy</button>
            <button id="sadBtn">Sad</button>
            <button id="angryBtn">Angry</button>
            <button id="relaxedBtn">Relaxed</button>
        </div>
    </nav>

    <div id="app">
        
        <!-- HEADER -->
        <h1>Evora</h1>
        <p>Shop based on how you feel 💖</p>

        <!-- SEARCH BAR -->
        <input type="text" id="search" placeholder="Search products..." />

        <!-- ADD PRODUCTS -->
        <button id="toggleFormBtn">➕ Add Product</button>
        <div id="addProductForm" style="display:none;">
            <h2>Add Product</h2>

            <input id="pName" placeholder="Product Name">
            <input id="pPrice" placeholder="Price (₹499)">
            <input id="pImage" placeholder="Image URL">
            <input id="pRating" placeholder="Rating (4.5⭐)">
            
            <select id="pEmotion">
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="angry">Angry</option>
                <option value="relaxed">Relaxed</option>
            </select>

            <button id="addProductBtn">Add Product</button>
        </div>

        <!-- EMOTION BUTTONS -->
        <div id="emotions">
            <button>😊 Happy</button>
            <button>😢 Sad</button>
            <button>😡 Angry</button>
            <button>😌 Relaxed</button>
        </div>

        <!-- PRODUCTS SECTION -->
        <div id="products">
            <p>Select an emotion to see products</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
