<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evora - Shop by Emotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="logo">Evora</div>
        <div class="nav-links">
            <span>Home</span>
            <span>Categories</span>
            <span>About</span>
        </div>
    </nav>

    <div id="app">
        
        <!-- HEADER -->
        <h1>Evora</h1>
        <p>Shop based on how you feel 💖</p>

        <!-- SEARCH BAR -->
        <input type="text" id="search" placeholder="Search products..." />

        <!-- EMOTION BUTTONS -->
        <div id="emotions">
            <button>😊 Happy</button>
            <button>😢 Sad</button>
            <button>😡 Angry</button>
            <button>😌 Relaxed</button>
        </div>

        <!-- PRODUCTS SECTION -->
        <div id="products">
            <p>Select an emotion to see products</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
